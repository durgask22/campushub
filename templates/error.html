{% extends "base.html" %}
{% block title %}{{ code }} Error{% endblock %}

{% block content %}
<div style="min-height:60vh;display:flex;align-items:center;justify-content:center;padding:40px 24px;">
  <div style="text-align:center;max-width:400px;">
    <div style="font-family:var(--font-display);font-size:96px;color:var(--parchment);line-height:1;margin-bottom:8px;">{{ code }}</div>
    <h2 style="font-size:22px;margin-bottom:10px;">{{ 'Page Not Found' if code == 404 else 'Server Error' }}</h2>
    <p style="color:var(--muted);margin-bottom:24px;">{{ message }}</p>
    <a href="{{ url_for('home') }}" class="btn btn-primary">← Back to Home</a>
  </div>
</div>
{% endblock %}
